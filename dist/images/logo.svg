<svg
  width="220"
  height="48"
  viewBox="0 0 220 48"
  xmlns="http://www.w3.org/2000/svg"
>
  <text
    x="0"
    y="34"
    font-family="Inter, sans-serif"
    font-size="28"
    font-weight="700"
    fill="white"
    letter-spacing="0.4"
  >
    Zona <tspan fill="#38BDF8">Web</tspan>

    <animate
      attributeName="opacity"
      from="0"
      to="1"
      dur="0.7s"
      fill="freeze"
    />

    <animateTransform
      attributeName="transform"
      type="translate"
      from="0 4"
      to="0 0"
      dur="0.7s"
      fill="freeze"
    />
  </text>
</svg>
